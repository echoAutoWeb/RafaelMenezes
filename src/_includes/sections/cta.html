<!-- CTA: já incluído na home como section-cta-rm; este bloco pode ser usado em outras páginas -->
<section id="cta-51" class="cta-rm">
    <div class="cs-container">
        <div class="cs-content">
            <h2 class="cs-title">Contrate nossos serviços</h2>
            <p class="cs-text">
                Entre em contato e conte com a experiência do nosso escritório para defender os seus direitos.
            </p>
            <a href="/contact/" class="cs-button-solid">Preencha o formulário</a>
        </div>
    </div>
    <picture class="cs-picture">
        <source media="(max-width: 600px)" srcset="{% getUrl "/assets/images/landing.jpg" | resize({ width: 640, height: 812 }) | jpeg %}" type="image/jpeg">

        <img src="{% getUrl "/assets/images/landing.jpg" | resize({ width: 2048, height: 750 }) | jpeg %}" alt="" width="1920" height="426" loading="lazy" decoding="async">
