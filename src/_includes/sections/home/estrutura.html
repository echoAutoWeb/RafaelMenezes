<!-- ============================================ -->
<!-- BLOCCO: Conheça nossa estrutura            -->
<!-- id: estrutura                               -->
<!-- Fotos dos escritórios + atendimento presencial/online -->
<!-- ============================================ -->

<section id="estrutura" class="section-rm section-estrutura">
    <div class="cs-container">
        <h2 class="cs-title section-estrutura-title">Conheça nossa estrutura</h2>
        <div class="section-estrutura-inner">
            <div class="section-estrutura-images">
                <figure class="section-estrutura-figure" id="fig-poa">
                    <div class="section-estrutura-img-wrap" onclick="toggleCitySlide('fig-poa')">
                        <img class="city-img img-active" src="/assets/images/POA/C%C3%B3pia%20de%20IMG_1391.jpg" alt="Escritório Porto Alegre - Visão 1" loading="lazy" decoding="async">
                        <img class="city-img" src="/assets/images/POA/WhatsApp%20Image%202026-03-24%20at%2019.03.47.jpeg" alt="Escritório Porto Alegre - Visão 2" loading="lazy" decoding="async">
                    </div>
                    <div class="section-estrutura-dots" aria-hidden="true">
                        <span class="section-estrutura-dot dot-active" onclick="changeCitySlide('fig-poa', 0)"></span>
                        <span class="section-estrutura-dot" onclick="changeCitySlide('fig-poa', 1)"></span>
                    </div>
                    <figcaption>Porto Alegre / RS</figcaption>
                </figure>

                <figure class="section-estrutura-figure" id="fig-sm">
                    <div class="section-estrutura-img-wrap" onclick="toggleCitySlide('fig-sm')">
                        <img class="city-img img-active" src="/assets/images/SM/pic1.webp" alt="Escritório Santa Maria - Visão 1" loading="lazy" decoding="async">
                        <img class="city-img" src="/assets/images/SM/pic2.webp" alt="Escritório Santa Maria - Visão 2" loading="lazy" decoding="async">
                    </div>
                    <div class="section-estrutura-dots" aria-hidden="true">
                        <span class="section-estrutura-dot dot-active" onclick="changeCitySlide('fig-sm', 0)"></span>
                        <span class="section-estrutura-dot" onclick="changeCitySlide('fig-sm', 1)"></span>
                    </div>
                    <figcaption>Santa Maria / RS</figcaption>
                </figure>

                <figure class="section-estrutura-figure" id="fig-rio">
                    <div class="section-estrutura-img-wrap" onclick="toggleCitySlide('fig-rio')">
                        <img class="city-img img-active" src="/assets/images/RIO/rj-2.webp" alt="Escritório Rio de Janeiro - Visão 1" loading="lazy" decoding="async">
                        <img class="city-img" src="/assets/images/RIO/rj-3.webp" alt="Escritório Rio de Janeiro - Visão 2" loading="lazy" decoding="async">
                    </div>
                    <div class="section-estrutura-dots" aria-hidden="true">
                        <span class="section-estrutura-dot dot-active" onclick="changeCitySlide('fig-rio', 0)"></span>
                        <span class="section-estrutura-dot" onclick="changeCitySlide('fig-rio', 1)"></span>
                    </div>
                    <figcaption>Rio de Janeiro / RJ</figcaption>
                </figure>
            </div>

<style>
.section-estrutura-img-wrap {
    position: relative;
    width: 100%;
    /* Keep aspect ratio but allow stacking */
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: var(--border-radius, 8px);
    cursor: pointer;
}
.city-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
    z-index: 1;
}
.city-img.img-active {
    opacity: 1;
    z-index: 2;
}
.section-estrutura-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
}
.section-estrutura-dot {
    width: 10px;
    height: 10px;
    background-color: #ccc;
    border-radius: 50%;
    cursor: pointer;
    transition: background-color 0.3s;
}
.section-estrutura-dot.dot-active {
    background-color: var(--primary, #1e3a8a);
}
</style>

<script>
function changeCitySlide(figId, index) {
    const figure = document.getElementById(figId);
    if (!figure) return;
    
    // Update images
    const images = figure.querySelectorAll('.city-img');
    images.forEach((img, i) => {
        if (i === index) {
            img.classList.add('img-active');
        } else {
            img.classList.remove('img-active');
        }
    });

    // Update dots
    const dots = figure.querySelectorAll('.section-estrutura-dot');
    dots.forEach((dot, i) => {
        if (i === index) {
            dot.classList.add('dot-active');
        } else {
            dot.classList.remove('dot-active');
        }
    });
}

// Toggle slide on click/tap: advances to next image in the figure
function toggleCitySlide(figId) {
    const figure = document.getElementById(figId);
    if (!figure) return;
    const images = figure.querySelectorAll('.city-img');
    if (!images.length) return;
    // find current active index
    let current = 0;
    images.forEach((img, i) => {
        if (img.classList.contains('img-active')) current = i;
    });
    const next = (current + 1) % images.length;
    changeCitySlide(figId, next);
}
</script>
            <div class="section-estrutura-info">
                <h3 class="section-estrutura-subtitle">Atendimento Presencial</h3>
                <p class="cs-text">Porto Alegre</p>
                <p class="cs-text">Santa Maria</p>
                <p class="cs-text">Rio de Janeiro</p>
                <h3 class="section-estrutura-subtitle">Atendimento Online</h3>
                <p class="cs-text">Todo o Brasil</p>
                <a href="/#cs-footer-275" class="cs-button-solid" data-open-contact-modal>Fale conosco</a>
            </div>
        </div>
    </div>
</section>

<!-- Modal pequeno para contatos rápidos -->
<section class="contact-modal-overlay" id="contact-modal" hidden>
    <div class="contact-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="contact-modal-title">
        <button
            type="button"
            class="contact-modal-close"
            data-close-contact-modal
            aria-label="Fechar opções de contato"
        >
            ×
        </button>
        <h2 id="contact-modal-title" class="contact-modal-title">Fale conosco</h2>
        <div class="contact-modal-links">
            <a
                href="https://wa.me/{{ client.whatsapp }}"
                target="_blank"
                rel="noopener"
                class="contact-modal-link"
            >
                WhatsApp
            </a>
            <a href="tel:{{ client.phoneForTel }}" class="contact-modal-link">
                Ligar
            </a>
            <a href="mailto:{% raw %}{{ client.email }}{% endraw %}" class="contact-modal-link">
                E-mail
            </a>
        </div>
    </div>
</section>
